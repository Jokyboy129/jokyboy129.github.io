<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jokyboy129</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 800px;
  margin: 40px auto;
  line-height: 1.6;
  padding: 0 16px;
}

h1 {
  font-size: 2em;
}

.box {
  padding: 16px;
  border: 1px solid #ccc;
  border-radius: 10px;
  margin-top: 20px;
}

a {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 14px;
  background: #007acc;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}

a:hover {
  background: #005fa3;
}
</style>
</head>

<body>

<h1 id="title">Willkommen</h1>

<div class="box" id="content"></div>

<script>
const lang = navigator.language || navigator.userLanguage;
const isGerman = lang.startsWith("de");

const title = document.getElementById("title");
const content = document.getElementById("content");

// Titel setzen
title.textContent = isGerman ? "Willkommen" : "Welcome";

// Inhalt setzen
if (isGerman) {
  content.innerHTML = `
    Willkommen auf meiner Website.<br>
    Hier finden Sie alle meine öffentlich zugänglichen Programme. Diese werden hier kostenlos zum Download bereitgestellt.<br>
    Bitte beachten Sie: Da ich diese Website und die Programme nur als Hobby betreibe, geht die Entwicklung etwas langsamer voran.<br>

    <h2>Projektliste</h2>
    <a href="https://jokyboy129.github.io/Mathmax">
      Mathmax - ein Taschenrechner für Windows
    </a>
  `;
} else {
  content.innerHTML = `
    <p>Welcome to my personal website.</p>
    <p>Here you will find my publicly available projects. They are provided here for free download.</p>
    <p>Please note: Since this is a hobby project, development may progress a bit slower.</p>

    <h2>Project list</h2>
    <a href="https://jokyboy129.github.io/Mathmax">
      Mathmax - a calculator for Windows
    </a>
  `;
}
</script>

</body>
</html>
